bind 0.0.0.0
protected-mode yes
port 6379

# RDB snapshot policy (suitable for small data and non-critical loss tolerance)
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# Keep AOF disabled for now (RDB-only mode)
appendonly no

# Memory / logging (optional defaults)
maxmemory-policy noeviction
loglevel notice
